<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boggle Solver - 4x4 Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h1>Word Trace Solver</h1>
        <p id="status">Loading dictionary...</p>

        <div class="grid" id="word-grid">
            <!-- 16 inputs generated by JavaScript -->
        </div>

        <div class="controls">
            <button id="solve-btn" disabled onclick="solve()">Find Words</button>
            <button onclick="clearGrid()">Clear</button>
        </div>

        <div class="results-container">
            <h2>Longest Words Found:</h2>
            <div id="results-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
